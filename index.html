<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PikaDrop • Містерій Дропи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .pika-yellow { color: #FFCC00; }
        .bg-pika { background-color: #FFCC00; color: black; }
        .card { transition: all 0.2s ease; }
        .tab-active { color: #FFCC00; border-bottom: 3px solid #FFCC00; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    
    <!-- Header -->
    <div class="bg-black border-b border-zinc-800 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-10 h-10 bg-[#FFCC00] rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-bolt text-black text-3xl"></i>
            </div>
            <div>
                <div class="text-2xl font-bold tracking-tight">PikaDrop</div>
                <div class="text-xs text-zinc-400 -mt-1">Веселі містерій дропи</div>
            </div>
        </div>
        <div class="flex items-center gap-x-2">
            <div class="text-right text-sm">
                <div class="font-medium">@demo_vadym</div>
                <div class="text-xs text-[#FFCC00]">EN</div>
            </div>
            <img src="https://i.pravatar.cc/32?img=12" class="w-8 h-8 rounded-full ring-2 ring-zinc-700" alt="">
        </div>
    </div>

    <!-- Discover -->
    <div class="p-4">
        <div class="mb-4">
            <input id="search" type="text" placeholder="Пошук дропів..." 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-sm"
                   oninput="filterItems()">
        </div>

        <!-- Filters -->
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <button onclick="filterBy('all')" class="px-4 py-1.5 bg-[#FFCC00] text-black text-sm rounded-2xl font-medium">All</button>
            <button onclick="filterBy('low')" class="px-4 py-1.5 bg-zinc-800 text-sm rounded-2xl">Low stock</button>
            <button onclick="filterBy('cheap')" class="px-4 py-1.5 bg-zinc-800 text-sm rounded-2xl">До $100</button>
        </div>

        <div class="flex justify-between items-center mb-3 px-1">
            <div class="font-semibold">Доступні дропи</div>
            <div id="count" class="text-xs text-zinc-400">12 дропів</div>
        </div>

        <!-- Items Grid -->
        <div id="items-grid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 flex justify-around py-2 text-xs">
        <button onclick="switchTab('discover')" class="flex flex-col items-center text-[#FFCC00]">
            <i class="fa-solid fa-compass text-lg"></i>
            <span>Discover</span>
        </button>
        <button onclick="switchTab('locations')" class="flex flex-col items-center text-zinc-400">
            <i class="fa-solid fa-map text-lg"></i>
            <span>Locations</span>
        </button>
        <button onclick="switchTab('wishlist')" class="flex flex-col items-center text-zinc-400">
            <i class="fa-solid fa-heart text-lg"></i>
            <span>Wishlist</span>
        </button>
        <button onclick="switchTab('profile')" class="flex flex-col items-center text-zinc-400">
            <i class="fa-solid fa-user text-lg"></i>
            <span>Profile</span>
        </button>
    </div>

    <!-- Item Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-end justify-center z-[100]">
        <div class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
            <div class="flex justify-between mb-4">
                <div id="modal-name" class="text-2xl font-bold"></div>
                <button onclick="closeModal()" class="text-2xl">×</button>
            </div>
            
            <div id="modal-price" class="text-3xl font-bold text-[#FFCC00] mb-4"></div>
            
            <div id="modal-desc" class="text-zinc-300 mb-6"></div>
            
            <button onclick="buyItem()" 
                    class="w-full py-4 bg-[#FFCC00] text-black font-bold rounded-2xl text-lg active:scale-[0.985]">
                КУПИТИ ЗАРАЗ
            </button>
        </div>
    </div>

    <script>
        let items = [
            { id: 1, name: "Neon Pika Sculpture", price: 89, stock: 4, desc: "Яскрава неонова скульптура в стилі Пікачу." },
            { id: 2, name: "Electric Memory Box", price: 145, stock: 2, desc: "Коробка з електричним посланням." },
            { id: 3, name: "Pika Zine 2025", price: 55, stock: 12, desc: "Рідкісний арт-зін про Пікачу." }
        ];

        let currentFilter = 'all';

        function renderItems(filteredItems) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';

            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-zinc-900 border border-zinc-700 rounded-3xl p-3 cursor-pointer card`;
                card.innerHTML = `
                    <div class="font-semibold mb-1">${item.name}</div>
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-xl font-bold text-[#FFCC00]">$${item.price}</span>
                        </div>
                        <div class="text-xs text-zinc-400">${item.stock} left</div>
                    </div>
                `;
                card.onclick = () => showItem(item);
                grid.appendChild(card);
            });

            document.getElementById('count').innerText = `${filteredItems.length} дропів`;
        }

        function filterItems() {
            const search = document.getElementById('search').value.toLowerCase();
            let result = items;

            if (currentFilter === 'low') result = result.filter(i => i.stock <= 3);
            if (currentFilter === 'cheap') result = result.filter(i => i.price < 100);

            if (search) {
                result = result.filter(i => i.name.toLowerCase().includes(search));
            }

            renderItems(result);
        }

        function filterBy(type) {
            currentFilter = type;
            filterItems();
        }

        function showItem(item) {
            document.getElementById('modal-name').innerText = item.name;
            document.getElementById('modal-price').innerText = `$${item.price}`;
            document.getElementById('modal-desc').innerText = item.desc;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');

            window.currentItem = item;
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('modal').classList.add('hidden');
        }

        function buyItem() {
            const item = window.currentItem;
            if (!item) return;

            if (item.stock > 0) {
                item.stock--;
                alert(`Дякую! Ти купив "${item.name}". Залишилось ${item.stock} шт.`);
                closeModal();
                filterItems();
            } else {
                alert('На жаль, товар закінчився');
            }
        }

        function switchTab(tab) {
            // Поки що просто показуємо alert для інших вкладок
            if (tab === 'discover') {
                document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
                // Показуємо discover
            } else {
                alert('Ця вкладка поки що в розробці. Скоро буде!');
            }
        }

        // Початковий рендер
        function init() {
            renderItems(items);
            
            // Tailwind script
            document.documentElement.style.setProperty('--accent', '#FFCC00');
        }

        window.onload = init;
    </script>
</body>
</html>
